name: SonarCloud analysis

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  Analysis:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ Java setup
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ✅ Download dependencies
      - name: Download dependencies
        run: |
          curl -L -o servlet-api.jar https://repo1.maven.org/maven2/javax/servlet/javax.servlet-api/4.0.1/javax.servlet-api-4.0.1.jar
          curl -L -o commons-lang.jar https://repo1.maven.org/maven2/commons-lang/commons-lang/2.6/commons-lang-2.6.jar
          curl -L -o commons-codec.jar https://repo1.maven.org/maven2/commons-codec/commons-codec/1.15/commons-codec-1.15.jar
          curl -L -o javax-mail.jar https://repo1.maven.org/maven2/com/sun/mail/javax.mail/1.6.2/javax.mail-1.6.2.jar

      # ✅ Compile (DO NOT FAIL PIPELINE)
      - name: Compile Java sources (best effort)
        run: |
          mkdir -p target/classes
          find . -name "*.java" > sources.txt
          export _JAVA_OPTIONS="-Xmx2g"
          
          # Compile but don't fail build
          javac -cp "servlet-api.jar:commons-lang.jar:commons-codec.jar:javax-mail.jar" \
                -d target/classes @sources.txt || true

      # ✅ SonarCloud
      - name: Run SonarCloud
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Sambit-rgb_Java-juliet-test-suite
            -Dsonar.organization=sambit-rgb
            -Dsonar.sources=.
            -Dsonar.java.binaries=target/classes
            -Dsonar.host.url=https://sonarcloud.io
