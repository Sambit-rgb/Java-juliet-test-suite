```yaml
name: SonarCloud analysis

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  Analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ✅ Java (optional but safe for Sonar)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # ❌ REMOVED compilation (fixes servlet errors)

      # ✅ SonarCloud Scan (no build)
      - name: Analyze with SonarCloud
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Sambit-rgb_Java-juliet-test-suite
            -Dsonar.organization=sambit-rgb
            -Dsonar.sources=.
            -Dsonar.exclusions=**/testcases/**,**/*ServletMain.java
            -Dsonar.host.url=https://sonarcloud.io
```
