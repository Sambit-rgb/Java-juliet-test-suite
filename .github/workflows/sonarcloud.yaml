name: SonarCloud analysis

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  Analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ✅ Download Servlet API (fixes your error)
      - name: Download Servlet API
        run: |
          curl -L -o servlet-api.jar https://repo1.maven.org/maven2/javax/servlet/javax.servlet-api/4.0.1/javax.servlet-api-4.0.1.jar

      # ✅ Compile ALL Java sources
      - name: Compile Java sources
        run: |
          mkdir -p target/classes
          find . -name "*.java" > sources.txt
          javac -cp servlet-api.jar -d target/classes @sources.txt

      # ✅ SonarCloud Scan
      - name: Run SonarCloud
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Sambit-rgb_Java-juliet-test-suite
            -Dsonar.organization=sambit-rgb
            -Dsonar.sources=.
            -Dsonar.java.binaries=target/classes
            -Dsonar.host.url=https://sonarcloud.io
